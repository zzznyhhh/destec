<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — DESTEC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-bg-orb auth-orb-1"></div>
  <div class="auth-bg-orb auth-orb-2"></div>

  <div class="auth-layout">
    <div class="auth-brand">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">DESTEC</span>
      </a>
      <p class="auth-brand-tagline">AI Deskripsi Produk untuk UMKM Indonesia</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Masuk</button>
        <button class="auth-tab" id="tabRegister">Daftar</button>
      </div>

      <!-- Alert -->
      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="nama@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="loginBtn">
          <span id="loginBtnText">Masuk</span>
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label" for="regName">Nama Lengkap</label>
          <input type="text" id="regName" class="form-input" placeholder="Nama Lengkap" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input type="email" id="regEmail" class="form-input" placeholder="nama@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <input type="password" id="regPassword" class="form-input" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="registerBtn">
          <span id="registerBtnText">Buat Akun</span>
        </button>
      </form>

      <div class="auth-divider"><span>atau</span></div>

      <button class="btn-google" id="googleBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Lanjutkan dengan Google
      </button>

      <p class="auth-footer-note">
        Dengan mendaftar, kamu menyetujui <a href="#">Syarat &amp; Ketentuan</a> kami.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Redirect if already logged in
      try {
        const session = await DestecAuth.getSession();
        if (session) { window.location.href = '/generator.html'; return; }
      } catch (e) { /* config might fail in dev without env vars */ }

      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const alertEl = document.getElementById('authAlert');

      function showAlert(msg, type = 'error') {
        alertEl.textContent = msg;
        alertEl.className = `auth-alert auth-alert--${type}`;
        alertEl.style.display = 'block';
      }
      function hideAlert() { alertEl.style.display = 'none'; }

      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.style.display = '';
        registerForm.style.display = 'none';
        hideAlert();
      });
      tabRegister.addEventListener('click', () => {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        registerForm.style.display = '';
        loginForm.style.display = 'none';
        hideAlert();
      });

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();
        const btnText = document.getElementById('loginBtnText');
        btnText.textContent = 'Memproses...';
        document.getElementById('loginBtn').disabled = true;
        try {
          const { error } = await DestecAuth.signIn(
            document.getElementById('loginEmail').value.trim(),
            document.getElementById('loginPassword').value
          );
          if (error) {
            showAlert('Email atau password salah. Silakan coba lagi.');
          } else {
            window.location.href = '/generator.html';
          }
        } catch (err) {
          showAlert('Terjadi kesalahan. Coba lagi.');
        }
        btnText.textContent = 'Masuk';
        document.getElementById('loginBtn').disabled = false;
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert();
        const btnText = document.getElementById('registerBtnText');
        btnText.textContent = 'Memproses...';
        document.getElementById('registerBtn').disabled = true;
        try {
          const { error } = await DestecAuth.signUp(
            document.getElementById('regEmail').value.trim(),
            document.getElementById('regPassword').value,
            document.getElementById('regName').value.trim()
          );
          if (error) {
            showAlert(error.message || 'Pendaftaran gagal. Coba lagi.');
          } else {
            showAlert('Akun berhasil dibuat! Cek email untuk konfirmasi, lalu masuk.', 'success');
          }
        } catch (err) {
          showAlert('Terjadi kesalahan. Coba lagi.');
        }
        btnText.textContent = 'Buat Akun';
        document.getElementById('registerBtn').disabled = false;
      });

      document.getElementById('googleBtn').addEventListener('click', async () => {
        try {
          await DestecAuth.signInWithGoogle();
        } catch (err) {
          showAlert('Login dengan Google gagal. Pastikan Google OAuth aktif di Supabase.');
        }
      });
    });
  </script>
</body>
</html>
